<!DOCTYPE html>
<html>

<head>
    <title>T-Shirt Booking</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="header-card">

        <div class="header-left">

            <div class="header-logo">
                <img src="logo.png" alt="Logo">
            </div>

            <div class="header-text">

                <h1>श्री सिद्धिविनायक सार्वजनिक गणेशोत्सव मंडळ</h1>

                <p>T-Shirt Management System 2026</p>

            </div>

        </div>

    </div>

    <div class="page-title">

        <h2>New Booking</h2>

        <p>Create a new T-Shirt booking</p>

    </div>

    <div class="form-card">

        <h3 class="section-heading">Customer Details</h3>

        <div class="form-group">

            <label>Customer Name</label>

            <input
                id="name"
                type="text"
                placeholder="Enter customer name"
                oninput="validateName(this)">

        </div>

        <div class="form-group">

            <label>Mobile Number</label>

            <input
                id="mobile"
                maxlength="10"
                inputmode="numeric"
                placeholder="Enter mobile number"
                oninput="this.value=this.value.replace(/\D/g,'')">

        </div>

    </div>

    <div class="form-card">

        <h3 class="section-heading">

            T-Shirt Details

        </h3>

        <div id="sizeContainer"></div>

        <button
            class="secondary-btn"
            type="button"
            onclick="addSizeRow()">

            Add Another Size

        </button>

    </div>

    <div class="summary-card">

        <div>

            <span>Total Quantity</span>

            <strong id="totalQty">0</strong>

        </div>

        <div>

            <span>Total Amount</span>

            <strong id="amount">₹0</strong>

        </div>

    </div>

    <div class="form-card">

        <h3 class="section-heading">

            Payment Details

        </h3>

        <div class="form-group">

            <label>Payment Mode</label>

            <select id="paymentMode">

                <option>UPI</option>
                <option>Cash</option>

            </select>

        </div>

        <div class="form-group">

            <label>Payment Status</label>

            <select id="paymentStatus">

                <option>Paid</option>
                <option>Unpaid</option>

            </select>

        </div>

    </div>

    <div class="button-row">

        <button class="primary-btn" onclick="saveBooking()">

            Save Booking

        </button>

        <button class="secondary-btn"
            onclick="window.location.href='dashboard.html'">

            Back to Dashboard

        </button>

    </div>

</div>

<script src="app.js"></script>

<script>

checkLogin();

addSizeRow();

</script>

</body>
</html>
