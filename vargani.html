<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vargani Collection</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="mobile-card">

<h1>🏠 Vargani Collection</h1>

<input id="wing" placeholder="Wing">

<input id="roomNo" type="number" placeholder="Room Number">

<input id="building" placeholder="Building Name" pattern="[A-Za-z ]+">

<input id="donorName" placeholder="Donor Name" pattern="[A-Za-z ]+">

<input id="mobile" type="tel" maxlength="10" placeholder="Mobile Number">

<input id="amount" type="number" placeholder="Amount">

<select id="status">
<option>Collected</option>
<option>Pending</option>
<option>Revisit</option>
<option>House Closed</option>
</select>

<button onclick="saveVargani()">
Save Collection
</button>

</div>

<script src="app.js"></script>

</body>
</html>
