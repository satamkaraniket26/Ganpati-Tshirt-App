<!DOCTYPE html>
<html>
<div class="page-logo">
    <img src="logo.png" alt="Mandal Logo">
</div>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Customer Booking</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="booking-container">

<h2>Customer Details</h2>

<input
id="custName"
placeholder="Customer Name">

<input
id="custMobile"
maxlength="10"
placeholder="Mobile Number">

<h2>Select T-Shirt Sizes</h2>

<div class="size-grid">

<button class="size-btn" data-size="20" onclick="addSelectedSize(20)">20</button>
<button class="size-btn" data-size="22" onclick="addSelectedSize(22)">22</button>
<button class="size-btn" data-size="24" onclick="addSelectedSize(24)">24</button>
<button class="size-btn" data-size="26" onclick="addSelectedSize(26)">26</button>
<button class="size-btn" data-size="28" onclick="addSelectedSize(28)">28</button>

<button class="size-btn" data-size="30" onclick="addSelectedSize(30)">30</button>
<button class="size-btn" data-size="32" onclick="addSelectedSize(32)">32</button>
<button class="size-btn" data-size="34" onclick="addSelectedSize(34)">34</button>
<button class="size-btn" data-size="36" onclick="addSelectedSize(36)">36</button>
<button class="size-btn" data-size="38" onclick="addSelectedSize(38)">38</button>

<button class="size-btn" data-size="40" onclick="addSelectedSize(40)">40</button>
<button class="size-btn" data-size="42" onclick="addSelectedSize(42)">42</button>
<button class="size-btn" data-size="44" onclick="addSelectedSize(44)">44</button>

</div>

<br>

<div id="selectedSizes"></div>

<hr>

<label>

<input
type="checkbox"
id="needId"
onchange="toggleIdSection()">

Need ID Card

</label>

<div id="idSection" style="display:none;">

<br>

<input
id="idQty"
type="number"
value="1"
min="1"
oninput="calculateCustomerTotal()"
placeholder="ID Quantity">

</div>

<hr>

<div class="sticky-summary">

    <div class="mobile-summary">

        <span>
            T-Shirts:
            <b id="custTotalQty">0</b>
        </span>

        <span>
            ID:
            <b id="summaryIdQty">0</b>
        </span>

    </div>

    <div class="mobile-total">

        ₹<span id="custAmount">0</span>

    </div>

    <button
    class="payment-btn"
    onclick="continuePayment()">

        Proceed To Payment

    </button>

</div>

</div>

<script src="app.js"></script>

<script>

addCustomerSizeRow();

</script>

</body>

</html>
