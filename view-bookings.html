<!DOCTYPE html>
<html>
    
<head>
    <title>View Bookings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>
<body onload="checkLogin();loadBookings();">

<div class="container">

    <!-- Header -->

    <div class="header-card">

        <div class="header-left">

            <div class="header-logo">

                <img src="logo.png" alt="Logo">

            </div>

            <div class="header-text">

                <h1>श्री सिद्धिविनायक सार्वजनिक गणेशोत्सव मंडळ</h1>

                <p>T-Shirt Management System 2026</p>

            </div>

        </div>

    </div>

    <!-- Page Title -->

    <div class="page-title">

        <h2>View Bookings</h2>

        <p>Search and manage all T-Shirt bookings</p>

    </div>

    <!-- Search Card -->

    <div class="form-card">

        <h3 class="section-heading">

            Search Filters

        </h3>

        <div class="filter-grid">

            <div class="form-group">

                <label>Search</label>

                <input
                    type="text"
                    id="searchBox"
                    placeholder="Booking ID, Name or Mobile"
                    onkeyup="applyFilters()">

            </div>

            <div class="form-group">

                <label>Payment Status</label>

                <select
                    id="statusFilter"
                    onchange="applyFilters()">

                    <option value="All">All</option>
                    <option value="Paid">Paid</option>
                    <option value="Unpaid">Unpaid</option>

                </select>

            </div>

        </div>

    </div>

    <!-- Summary -->

    <div class="dashboard-grid">

        <div class="stat-card">

            <span class="card-label">

                Total Records

            </span>

            <h1 id="totalRecords">0</h1>

        </div>

        <div class="stat-card">

            <span class="card-label">

                Total T-Shirts

            </span>

            <h1 id="summaryQty">0</h1>

        </div>

        <div class="stat-card">

            <span class="card-label">

                Total Collection

            </span>

            <h1>₹<span id="summaryAmount">0</span></h1>

        </div>

    </div>

    <!-- Table -->

    <div class="form-card">

        <h3 class="section-heading">

            Booking List

        </h3>

        <div class="table-container">

            <table
                id="bookingTable"
                class="booking-table">

                <thead>

                    <tr>

                        <th>Booking ID</th>
                        <th>Name</th>
                        <th>Mobile</th>
                        <th>Qty</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Created By</th>
                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="bookingBody">

                </tbody>

            </table>

        </div>

    </div>

    <div class="button-row">

        <button
            class="secondary-btn"
            onclick="window.location.href='dashboard.html'">

            Back to Dashboard

        </button>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
